<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide to Rise! — Sneet Games</title>
  <meta name="description" content="Play Slide to Rise!, a puzzle game by Sneet Games. Built with Unity WebGL.">
  <link rel="shortcut icon" href="Build/Slide To Rise.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0b0d1a;
      --bg-surface: #10132a;
      --accent: #6c5ce7;
      --accent-bright: #a29bfe;
      --cyan: #00cec9;
      --cyan-dim: #0a8f8c;
      --text-primary: #f1f0f7;
      --text-secondary: #7c7a8e;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-primary);
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text-primary);
    }

    /* ── Loading Screen ─────────────────────────────── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* Animated gradient orbs behind content */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      animation: orb-float 6s ease-in-out infinite;
    }

    .orb-1 {
      width: 300px;
      height: 300px;
      background: rgba(108, 92, 231, 0.2);
      top: 30%;
      left: 35%;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 250px;
      height: 250px;
      background: rgba(0, 206, 201, 0.15);
      top: 45%;
      right: 35%;
      animation-delay: -3s;
    }

    @keyframes orb-float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(20px, -20px) scale(1.1); }
      66%      { transform: translate(-15px, 10px) scale(0.95); }
    }

    .loading-content {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
    }

    /* Rising arrow animation */
    .rise-icon {
      width: 32px;
      height: 32px;
      opacity: 0.5;
      animation: rise-bounce 2s ease-in-out infinite;
    }

    @keyframes rise-bounce {
      0%, 100% { transform: translateY(0); opacity: 0.3; }
      50%      { transform: translateY(-10px); opacity: 0.7; }
    }

    .game-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: clamp(2.2rem, 7vw, 3.6rem);
      letter-spacing: -0.02em;
      text-align: center;
      line-height: 1.1;
      user-select: none;
    }

    .game-title .word-slide {
      background: linear-gradient(135deg, var(--accent-bright), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .game-title .word-to {
      font-weight: 600;
      font-size: 0.6em;
      color: var(--text-secondary);
      -webkit-text-fill-color: var(--text-secondary);
      margin: 0 4px;
    }

    .game-title .word-rise {
      color: var(--text-primary);
      -webkit-text-fill-color: var(--text-primary);
    }

    .game-title .punctuation {
      background: linear-gradient(135deg, var(--cyan), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .studio-name {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    /* Progress bar */
    .progress-container {
      width: clamp(200px, 50vw, 320px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .progress-track {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--cyan));
      border-radius: 4px;
      transition: width 0.3s ease-out;
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      right: 0;
      top: -2px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 12px var(--cyan), 0 0 24px rgba(0, 206, 201, 0.4);
    }

    .progress-text {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.1em;
    }

    /* ── Unity Container ────────────────────────────── */
    #unity-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      position: relative;
    }

    #unity-canvas {
      background: var(--bg-surface);
      border-radius: 6px;
      box-shadow: 0 4px 40px rgba(108, 92, 231, 0.08);
    }

    #unity-canvas.unity-mobile {
      width: 100% !important;
      height: 100% !important;
      border-radius: 0;
      box-shadow: none;
    }

    /* Warning banner */
    #unity-warning {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      max-width: 600px;
      width: 90%;
    }

    #unity-warning div {
      padding: 12px 20px;
      margin-bottom: 8px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 500;
      backdrop-filter: blur(12px);
      animation: slide-in 0.3s ease-out;
    }

    @keyframes slide-in {
      from { transform: translateY(-12px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    /* Footer toolbar */
    #unity-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(11, 13, 26, 0.85);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      padding: 0 20px;
      z-index: 50;
    }

    #unity-build-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
    }

    #unity-fullscreen-button {
      width: 28px;
      height: 28px;
      cursor: pointer;
      opacity: 0.4;
      transition: opacity 0.2s ease;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23f1f0f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>') center/contain no-repeat;
    }

    #unity-fullscreen-button:hover {
      opacity: 1;
    }

    /* Hide default Unity loading bar */
    #unity-loading-bar {
      display: none !important;
    }
  </style>
</head>
<body>

  <!-- Custom Loading Screen -->
  <div id="loading-overlay">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="loading-content">
      <svg class="rise-icon" viewBox="0 0 24 24" fill="none" stroke="#00cec9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 19V5M5 12l7-7 7 7"/>
      </svg>
      <h1 class="game-title">
        <span class="word-slide">Slide</span><span class="word-to"> to </span><span class="word-rise">Rise</span><span class="punctuation">!</span>
      </h1>
      <p class="studio-name">Sneet Games</p>
      <div class="progress-container">
        <div class="progress-track">
          <div class="progress-fill" id="custom-progress"></div>
        </div>
        <p class="progress-text" id="progress-label">Loading…</p>
      </div>
    </div>
  </div>

  <!-- Unity Container -->
  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas" width="720" height="1280" tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
    <div id="unity-warning"></div>
    <div id="unity-footer">
      <div id="unity-build-title">Slide to Rise!</div>
      <div id="unity-fullscreen-button"></div>
    </div>
  </div>

  <script>
    var canvas = document.querySelector("#unity-canvas");
    var progressFill = document.getElementById("custom-progress");
    var progressLabel = document.getElementById("progress-label");
    var loadingOverlay = document.getElementById("loading-overlay");

    function unityShowBanner(msg, type) {
      var warningBanner = document.querySelector("#unity-warning");
      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
      }
      var div = document.createElement('div');
      div.innerHTML = msg;
      warningBanner.appendChild(div);
      if (type === 'error') {
        div.style.cssText = 'background: rgba(108,92,231,0.9); color: #fff;';
      } else {
        if (type === 'warning') {
          div.style.cssText = 'background: rgba(0,206,201,0.9); color: #111;';
        }
        setTimeout(function () {
          warningBanner.removeChild(div);
          updateBannerVisibility();
        }, 5000);
      }
      updateBannerVisibility();
    }

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/Slide To Rise.loader.js";
    var config = {
      arguments: [],
      dataUrl: buildUrl + "/Slide To Rise.data.br",
      frameworkUrl: buildUrl + "/Slide To Rise.framework.js.br",
      codeUrl: buildUrl + "/Slide To Rise.wasm.br",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "Sneet Games",
      productName: "Slide to Rise!",
      productVersion: "0.4",
      showBanner: unityShowBanner,
    };

    var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    if (isMobile) {
      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
      document.getElementsByTagName('head')[0].appendChild(meta);
      document.querySelector("#unity-container").className = "unity-mobile";
      canvas.className = "unity-mobile";
    } else {
      canvas.style.width = "720px";
      canvas.style.height = "1280px";
    }

    canvas.style.background = "url('" + buildUrl + "/Slide To Rise.jpg') center / cover";

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = function () {
      createUnityInstance(canvas, config, function (progress) {
        var pct = Math.round(progress * 100);
        progressFill.style.width = pct + "%";
        progressLabel.textContent = pct + "%";
      }).then(function (unityInstance) {
        loadingOverlay.classList.add("hidden");
        document.querySelector("#unity-fullscreen-button").onclick = function () {
          unityInstance.SetFullscreen(1);
        };
      }).catch(function (message) {
        alert(message);
      });
    };

    document.body.appendChild(script);
  </script>
</body>
</html>
